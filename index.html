<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NODE | SYSTEM STANDBY</title>
    <style>
        /* جلب خطوط الذكاء الاصطناعي العصرية */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            background-color: #020617; /* لون الفضاء العميق */
            font-family: 'Inter', sans-serif;
            color: #f8fafc;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* حلقة النبض الكمي الدوارة */
        .quantum-ring {
            position: absolute;
            width: clamp(250px, 40vw, 500px);
            height: clamp(250px, 40vw, 500px);
            border-radius: 50%;
            background: conic-gradient(from 0deg, transparent 70%, rgba(56, 189, 248, 0.8) 100%);
            animation: spin 8s linear infinite;
            z-index: 0;
            filter: blur(2px);
        }

        .quantum-ring::before {
            content: '';
            position: absolute;
            inset: 4px;
            background-color: #020617;
            border-radius: 50%;
        }

        /* الهالة المركزية (نبض الطاقة) */
        .core-pulse {
            position: absolute;
            width: clamp(150px, 20vw, 300px);
            height: clamp(150px, 20vw, 300px);
            background: radial-gradient(circle, rgba(139, 92, 246, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 1;
            animation: breathe 4s ease-in-out infinite alternate;
        }

        /* حاوية البيانات الزجاجية الفائقة */
        .glass-panel {
            position: relative;
            z-index: 2;
            width: 90%;
            max-width: 600px;
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px); /* توافق مثالي مع أجهزة أبل */
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: clamp(2rem, 5vw, 4rem);
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), 
                        inset 0 0 0 1px rgba(255, 255, 255, 0.02);
            transform: translateY(0);
            animation: float 6s ease-in-out infinite alternate;
        }

        /* نصوص الواجهة الطرفية (Terminal) */
        .sys-badge {
            display: inline-block;
            font-family: 'JetBrains Mono', monospace;
            font-size: clamp(0.7rem, 2vw, 0.85rem);
            color: #38bdf8;
            background: rgba(56, 189, 248, 0.1);
            padding: 6px 16px;
            border-radius: 50px;
            border: 1px solid rgba(56, 189, 248, 0.2);
            letter-spacing: 1px;
            margin-bottom: 2rem;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.2);
        }

        h1 {
            font-size: clamp(1.8rem, 5vw, 3rem);
            font-weight: 300;
            letter-spacing: 4px;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #f8fafc, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: clamp(0.9rem, 2.5vw, 1.1rem);
            color: #64748b;
            line-height: 1.8;
            font-weight: 300;
            margin-bottom: 2.5rem;
        }

        /* شريط التحميل السيبراني (Data Stream) */
        .data-stream {
            width: 100%;
            height: 2px;
            background: rgba(255, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
            border-radius: 2px;
        }

        .stream-bit {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 30%;
            background: linear-gradient(90deg, transparent, #8b5cf6, transparent);
            animation: scanStream 2.5s ease-in-out infinite;
        }

        /* رسالة التشفير أسفل الشاشة */
        .encryption-status {
            margin-top: 1.5rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: clamp(0.65rem, 1.8vw, 0.75rem);
            color: #475569;
            letter-spacing: 2px;
        }

        /* حركات الأنيميشن */
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes breathe { 
            0% { transform: scale(0.9); opacity: 0.4; } 
            100% { transform: scale(1.1); opacity: 1; } 
        }
        @keyframes float { 
            0% { transform: translateY(-8px); } 
            100% { transform: translateY(8px); } 
        }
        @keyframes scanStream {
            0% { left: -30%; }
            100% { left: 100%; }
        }
    </style>
</head>
<body>

    <div class="quantum-ring"></div>
    <div class="core-pulse"></div>

    <div class="glass-panel">
        <div class="sys-badge">● Node Status: Offline</div>
        
        <h1>Core Initialization</h1>
        <p>The neural infrastructure for this domain is currently in a deep sleep cycle. Development is ongoing silently in the background.</p>
        
        <div class="data-stream">
            <div class="stream-bit"></div>
        </div>

        <div class="encryption-status">
            AWAITING DEPLOYMENT PROTOCOL
        </div>
    </div>

</body>
</html>
